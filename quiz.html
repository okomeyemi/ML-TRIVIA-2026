<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz | ML Trivia 2026</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/quiz.css">
</head>
<body>

<header>

    <nav class="quiz-nav">

        <div class="logo">
            <h2>ML Trivia <span>2026</span></h2>
        </div>

        <div class="timer">

            <i class="fas fa-clock"></i>

            <span id="time">10:00</span>

        </div>

    </nav>

</header>

<main class="quiz-container">

    <div class="quiz-header">

        <h2>
            Question
            <span id="questionNumber">1</span>
            of
            <span id="totalQuestions">10</span>
        </h2>

        <div class="progress">

            <div class="progress-bar" id="progressBar"></div>

        </div>

    </div>

    <div class="question-card">

        <h3 id="question">
            Loading question...
        </h3>

        <div class="options" id="options">

            <!-- Options will appear here -->

        </div>

    </div>

    <div class="navigation">

        <button id="prevBtn">
            <i class="fas fa-arrow-left"></i>
            Previous
        </button>

        <button id="nextBtn">
            Next
            <i class="fas fa-arrow-right"></i>
        </button>

    </div>

    <div class="question-grid" id="questionGrid">

        <!-- Question numbers generated by JS -->

    </div>

    <button class="submit-btn" id="submitQuiz">

        Submit Quiz

    </button>

</main>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/questions.js"></script>
<script src="js/quiz.js"></script>

</body>
</html>
