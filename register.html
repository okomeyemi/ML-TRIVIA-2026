    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/register.css">
</head>
<body>

<header>

    <nav class="navbar">

        <div class="logo">
            <h2>ML Trivia <span>2026</span></h2>
        </div>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#prizes">Prizes</a></li>
            <li><a href="index.html#rules">Rules</a></li>
            <li><a href="register.html" class="active">Register</a></li>

        </ul>

        <div class="menu-btn">
            <i class="fas fa-bars"></i>
        </div>

    </nav>

</header>


<section class="register-hero">

    <h1>Register for ML Trivia 2026</h1>

    <p>
        Complete the registration form below to participate in the Mathematics League Trivia Challenge.
    </p>

</section>


<section class="register-page">

    <div class="register-card">

        <span class="step">Step 1 of 2</span>

        <h2>Participant Registration</h2>

        <form id="registerForm">

            <div class="input-box">
                <label>Full Name</label>
                <input type="text" id="fullname" placeholder="Enter your full name">
            </div>

            <div class="input-box">
                <label>WhatsApp Number</label>
                <input type="tel" id="phone" placeholder="08012345678">
            </div>

            <div class="checkbox">

                <input type="checkbox" id="agree">

                <label for="agree">
                    I agree to the competition rules.
                </label>

            </div>
            
            <div class="checkbox">
    <input type="checkbox" id="numberCorrect">
    <label for="numberCorrect">
        I confirm this WhatsApp number is correct and can receive airtime rewards.
    </label>
</div>

            <button type="submit" class="register-btn">
                Continue
            </button>

        </form>

    </div>

</section>


<footer>

    <p>© 2026 ML Trivia | Powered by <strong>Techzila.inc</strong></p>
